<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xuất Khẩu Lao Động Singapore</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }
        header {
            background: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .box {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }
        button {
            background: #28a745;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }
    </style>
</head>
<body>

<header>
    <h1>Đi Làm Tại Singapore 🇸🇬</h1>
    <p>Lương cao - Xuất cảnh nhanh - Uy tín</p>
</header>

<div class="container">

    <div class="box">
        <h2>🔥 Tuyển dụng mới nhất</h2>
        <p>✔ Công nhân nhà máy</p>
        <p>✔ Phục vụ nhà hàng</p>
        <p>✔ Xây dựng</p>
        <p><b>Lương:</b> 25 - 40 triệu/tháng</p>
    </div>

    <div class="box">
        <h2>💰 Chi phí đi Singapore</h2>
        <p>✔ Chi phí trọn gói: 60 - 120 triệu</p>
        <p>✔ Hỗ trợ vay vốn</p>
        <p>✔ Xuất cảnh sau 1 - 3 tháng</p>
    </div>

    <div class="box">
        <h2>📞 Đăng ký tư vấn miễn phí</h2>
        <input type="text" placeholder="Họ và tên">
        <input type="text" placeholder="Số điện thoại">
        <button onclick="alert('Đăng ký thành công! Chúng tôi sẽ liên hệ bạn.')">
            Đăng ký ngay
        </button>
    </div>

</div>

</body>
</html>
