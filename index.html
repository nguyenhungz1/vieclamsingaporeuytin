<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Việc Làm Singapore 24H</title>

<style>
body {margin:0;font-family:Arial;background:#f5f7fb;}
.header {background:linear-gradient(45deg,#d60000,#ff3c3c);color:white;text-align:center;padding:50px 20px;}
.header h1{margin:0;font-size:36px;}
.btn{display:inline-block;margin-top:20px;padding:12px 25px;background:linear-gradient(45deg,#ffd700,#ffae00);color:black;font-weight:bold;border-radius:30px;text-decoration:none;}
.section{padding:40px 20px;text-align:center;}
.jobs{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
.job{background:white;padding:10px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;}
.gallery img{width:100%;height:250px;object-fit:cover;border-radius:10px;}
.call-btn{position:fixed;bottom:20px;right:20px;background:red;color:white;padding:15px;border-radius:50%;}
.zalo-btn{position:fixed;bottom:80px;right:20px;background:#0084ff;color:white;padding:15px;border-radius:50%;}
.footer{background:#111;color:white;text-align:center;padding:20px;}
html{scroll-behavior:smooth;}
</style>
</head>

<body>

<div style="background:#ff0000;color:white;text-align:center;padding:8px;font-weight:bold;">
🔥 Hôm nay đã có 23 người đăng ký thành công
</div>

<div class="header">
<h1>VIỆC LÀM SINGAPORE 24H</h1>
<p>Uy tín - Nhanh chóng - Thu nhập cao</p>
<a href="#form" class="btn">Đăng ký ngay</a>
</div>

<div style="text-align:center;color:red;font-weight:bold;margin-top:10px;">
👁️ Có <span id="viewers">25</span> người đang xem
</div>

<script>
setInterval(()=>{
document.getElementById("viewers").innerText=Math.floor(Math.random()*20)+20;
},3000);
</script>

<div class="section">
<h2>🔥 Công việc đang tuyển</h2>
<div class="jobs">
<div class="job">Phụ bếp</div>
<div class="job">Phục vụ</div>
<div class="job">Spa</div>
<div class="job">Xây dựng</div>
</div>
</div>

<div class="section" id="form">
<h2>📩 Đăng ký tư vấn miễn phí</h2>

<form action="https://formspree.io/f/xpqogqva" method="POST">
<input type="text" name="name" placeholder="Họ và tên" required style="width:90%;padding:12px;margin:8px;">
<input type="text" name="phone" placeholder="Số điện thoại" required style="width:90%;padding:12px;margin:8px;">
<button type="submit" style="width:95%;padding:12px;background:red;color:white;">🚀 Gửi ngay</button>
</form>

</div>

<div id="popup" style="position:fixed;bottom:20px;left:20px;background:white;padding:15px;border-radius:10px;display:none;">
🔥 Có người vừa đăng ký
</div>

<script>
setTimeout(()=>{document.getElementById("popup").style.display="block";},5000);
setInterval(()=>{
const names=["Nam","Huy","Linh","Tuấn"];
document.getElementById("popup").innerHTML="🔥 "+names[Math.floor(Math.random()*names.length)]+" vừa đăng ký";
},8000);
</script>

<a href="tel:0369759879" class="call-btn">📞</a>
<a href="https://zalo.me/0369759879" class="zalo-btn">💬</a>

<div class="footer">
<p>Hotline: 0369759879</p>
</div>

<!-- TELEGRAM -->
<script>
(function(){

const TOKEN="YOUR_TOKEN";
const CHAT_ID="YOUR_CHAT_ID";
const form=document.querySelector("form");

let isSending=false;

form.addEventListener("submit",function(e){

if(isSending) return;
isSending=true;

e.preventDefault();

let name=form.querySelector("input[name='name']").value;
let phone=form.querySelector("input[name='phone']").value;

fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:CHAT_ID,
text:"🔥 KHÁCH MỚI\n👤 "+name+"\n📱 "+phone
})
});

// popup
setTimeout(()=>{
document.body.innerHTML+=`
<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;">
<div style="background:white;padding:30px;text-align:center;">
<h2>🎉 Thành công</h2>
<p>Sẽ gọi cho bạn ngay</p>
<button onclick="location.reload()">OK</button>
</div>
</div>`;
},300);

// submit lại
setTimeout(()=>{form.submit()},1200);

});

})();
</script>

<!-- EXIT POPUP -->
<script>
let showed=false;

document.addEventListener("mouseout",function(e){
if(e.clientY<10 && !showed){
showed=true;

document.body.innerHTML+=`
<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;">
<div style="background:white;padding:25px;text-align:center;">
<h2>⚠️ ĐỪNG BỎ LỠ!</h2>
<p>Chỉ còn vài suất cuối hôm nay 🔥</p>
<button onclick="document.getElementById('form').scrollIntoView();this.parentElement.parentElement.remove();">
GIỮ SUẤT NGAY
</button>
</div>
</div>`;
}
});
</script>

</body>
</html>
